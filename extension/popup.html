<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobRadar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      background: #030712;
      color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(6,182,212,0.15);
      border: 1px solid rgba(6,182,212,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #06b6d4;
      box-shadow: 0 0 8px rgba(6,182,212,0.8);
    }
    .logo-sweep {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 70%, rgba(6,182,212,0.5) 100%);
      animation: sweep 2s linear infinite;
    }
    @keyframes sweep { to { transform: rotate(360deg); } }

    .logo-text { font-weight: 700; font-size: 14px; }
    .logo-text span { background: linear-gradient(135deg, #06b6d4, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: auto;
      background: #6b7280;
    }
    .status-dot.online { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.6); }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat {
      padding: 12px 10px;
      text-align: center;
      background: #030712;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #e2e8f0;
    }
    .stat-label { font-size: 10px; color: #4b5563; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

    .current-job {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .current-label { font-size: 10px; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .current-title { font-weight: 600; color: #e2e8f0; line-height: 1.3; margin-bottom: 2px; font-size: 13px; }
    .current-company { color: #6b7280; font-size: 12px; }

    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: calc(100% - 32px);
      margin: 12px 16px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .save-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .save-btn.saved { background: linear-gradient(135deg, #10b981, #059669); }

    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .open-app {
      color: #06b6d4;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }
    .open-app:hover { text-decoration: underline; }
    .server-url { font-size: 10px; color: #374151; font-family: monospace; }

    .settings-row {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .settings-label { font-size: 10px; color: #4b5563; white-space: nowrap; }
    .settings-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 4px 8px;
      color: #9ca3af;
      font-size: 11px;
      font-family: monospace;
      outline: none;
    }
    .settings-input:focus { border-color: rgba(6,182,212,0.4); }

    .not-job-page {
      padding: 24px 16px;
      text-align: center;
      color: #4b5563;
      font-size: 12px;
      line-height: 1.5;
    }
    .not-job-page strong { color: #6b7280; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-sweep"></div>
      <div class="logo-dot"></div>
    </div>
    <span class="logo-text"><span>JobRadar</span></span>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalJobs">—</div>
      <div class="stat-label">Jobs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="applied">—</div>
      <div class="stat-label">Applied</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="interviews">—</div>
      <div class="stat-label">Interviews</div>
    </div>
  </div>

  <!-- Current Page Job -->
  <div id="currentJobSection" style="display:none;">
    <div class="current-job">
      <div class="current-label">Current page</div>
      <div class="current-title" id="jobTitle">Loading…</div>
      <div class="current-company" id="jobCompany"></div>
    </div>
    <button class="save-btn" id="saveBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Save to Pipeline
    </button>
  </div>

  <div id="notJobPage" class="not-job-page" style="display:none;">
    <strong>Not a job page</strong>
    Navigate to a job listing on LinkedIn, Indeed, Greenhouse, Lever, or Glassdoor to save it.
  </div>

  <!-- Server URL Setting -->
  <div class="settings-row">
    <span class="settings-label">Server:</span>
    <input class="settings-input" id="serverUrl" value="http://localhost:3000" />
  </div>

  <!-- Footer -->
  <div class="footer">
    <a class="open-app" id="openApp" href="#" target="_blank">Open JobRadar →</a>
    <span class="server-url" id="serverLabel">localhost:3000</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
